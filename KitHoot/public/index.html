<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kithoot</title>
    
    <!-- FAVICON .ICO TRADICIONAL -->
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <!-- Metadatos de WebApp pantalla completa -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Kithoot">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body, html { height: 100%; width: 100%; background: #111; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        #login-screen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100%; color: white; gap: 15px; padding: 20px;
        }
        #login-screen h2 { font-size: 2.2rem; color: #f2f2f2; }
        input, button.btn-join {
            padding: 15px; font-size: 1.2rem; border-radius: 8px; border: none; width: 100%; max-width: 300px;
            -webkit-appearance: none;
        }
        input { background: #fff; color: #333; }
        button.btn-join { background: #46178f; color: white; font-weight: bold; cursor: pointer; }
        button.btn-join:active { background: #331169; }

        #game-screen {
            display: none; height: 100vh; width: 100vw;
            grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
        }
        .btn-answer { border: none; font-size: 3.5rem; color: white; outline: none; cursor: pointer; -webkit-appearance: none; }
        .red { background: #e21b3c; }
        .blue { background: #1368ce; }
        .yellow { background: #d89e00; }
        .green { background: #26890c; }
        
        .btn-answer:active { opacity: 0.7; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Kithoot</h2>
        <input type="number" id="pin" placeholder="Game PIN" pattern="[0-9]*" inputmode="numeric">
        <input type="text" id="nickname" placeholder="Apodo" maxlength="15">
        <button class="btn-join" onclick="joinGame()">ENTRAR</button>
    </div>

    <div id="game-screen">
        <button class="btn-answer red" onclick="sendAnswer(0)">▲</button>
        <button class="btn-answer blue" onclick="sendAnswer(1)">◆</button>
        <button class="btn-answer yellow" onclick="sendAnswer(2)">●</button>
        <button class="btn-answer green" onclick="sendAnswer(3)">■</button>
    </div>

    <script>
        function joinGame() {
            var pinVal = document.getElementById('pin').value;
            var nickVal = document.getElementById('nickname').value;

            if(!pinVal || !nickVal) { alert("Llena ambos campos, mano."); return; }

            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/join", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('game-screen').style.display = 'grid';
                    } else {
                        var response = JSON.parse(xhr.responseText);
                        alert("Error: " + (response.error || "PIN inválido."));
                    }
                }
            };
            xhr.send(JSON.stringify({ pin: pinVal, name: nickVal }));
        }

        function sendAnswer(choice) {
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/answer", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.send(JSON.stringify({ choice: choice }));
        }
    </script>
</body>
</html>
