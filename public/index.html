<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kithoot</title>
    
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Kithoot">

    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            background: #46178f; 
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* PANTALLA DE LOGIN */
        #login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
        }

        .card-login {
            background: #ffffff;
            border-radius: 16px;
            padding: 28px 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            gap: 14px;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: #46178f;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid #ccc;
            border-radius: 8px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        input:focus {
            border-color: #46178f;
        }

        .btn-join {
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffffff;
            background: #333333;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 0 #111111;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            -webkit-appearance: none;
        }

        .btn-join:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #111111;
        }

        /* PANTALLA DE JUEGO (BOTONES EN GRID) */
        #game-screen {
            display: none;
            height: 100vh;
            width: 100vw;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12px;
            padding: 12px;
            background: #121212;
        }

        .btn-answer {
            border: none;
            border-radius: 12px;
            font-size: 4.5rem;
            color: white;
            outline: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.08s ease, filter 0.1s;
            -webkit-appearance: none;
        }

        /* Colores Oficiales con Sombra 3D */
        .red    { background: #e21b3c; box-shadow: inset 0 -8px 0 rgba(0,0,0,0.25); }
        .blue   { background: #1368ce; box-shadow: inset 0 -8px 0 rgba(0,0,0,0.25); }
        .yellow { background: #d89e00; box-shadow: inset 0 -8px 0 rgba(0,0,0,0.25); }
        .green  { background: #26890c; box-shadow: inset 0 -8px 0 rgba(0,0,0,0.25); }

        .btn-answer:active {
            transform: scale(0.96);
            filter: brightness(0.85);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.25);
        }

        /* Feedback visual cuando envías respuesta */
        .selected {
            outline: 6px solid #ffffff !important;
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card-login">
            <h1 class="logo">Kithoot</h1>
            <input type="number" id="pin" placeholder="PIN del juego" pattern="[0-9]*" inputmode="numeric">
            <input type="text" id="nickname" placeholder="Tu Apodo" maxlength="15">
            <button class="btn-join" onclick="joinGame()">Ingresar</button>
        </div>
    </div>

    <div id="game-screen">
        <button class="btn-answer red" onclick="sendAnswer(0, this)">▲</button>
        <button class="btn-answer blue" onclick="sendAnswer(1, this)">◆</button>
        <button class="btn-answer yellow" onclick="sendAnswer(2, this)">●</button>
        <button class="btn-answer green" onclick="sendAnswer(3, this)">■</button>
    </div>

    <script>
        async function joinGame() {
            var pinInput = document.getElementById('pin').value.trim();
            var nickInput = document.getElementById('nickname').value.trim();

            if (!pinInput || !nickInput) {
                alert("Por favor pon el PIN y tu Apodo.");
                return;
            }

            try {
                var response = await fetch('/join', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin: parseInt(pinInput, 10), name: nickInput })
                });

                var data = await response.json();

                if (response.ok && data.success) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('game-screen').style.display = 'grid';
                } else {
                    alert("Error: " + (data.error || "No se pudo conectar al Kahoot."));
                }
            } catch (err) {
                console.error("Error en la petición:", err);
                alert("Error de conexión con el servidor.");
            }
        }

        async function sendAnswer(choice, btnElement) {
            // Animación rápida al tocar la opción
            document.querySelectorAll('.btn-answer').forEach(b => b.classList.remove('selected'));
            if(btnElement) btnElement.classList.add('selected');

            try {
                await fetch('/answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ choice: parseInt(choice, 10) })
                });
            } catch (err) {
                console.error("Error enviando respuesta:", err);
            }
        }
    </script>
</body>
</html>
